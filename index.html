<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link href="./output.css" rel="stylesheet" />

    <title>Frontend Mentor | Blog preview card</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body
    class="bg-yellow font-figtree min-h-screen flex justify-center items-center px-6 py-8"
  >
    <main
      class="bg-white p-6 max-w-xs rounded-3xl text-sm text-gray-950 font-medium leading-[150%] shadow-[8px_8px_0px_black] md:max-w-sm"
    >
      <div class="rounded-xl mb-6 h-50 overflow-hidden">
        <img
          src="./assets/images/illustration-article.svg"
          alt="Cover photo of blog"
          class="h-full object-cover"
        />
      </div>
      <div
        class="mb-3 bg-yellow inline-block px-3 py-1 text-xs md:text-sm font-extrabold rounded-sm"
      >
        Learning
      </div>
      <h2 class="mb-3 text-xs md:text-sm">Published 21 Dec 2023</h2>
      <h1 class="mb-3 text-xl font-extrabold md:text-2xl">
        HTML & CSS foundations
      </h1>
      <p class="mb-6 text-gray-500 md:text-base">
        These languages are the backbone of every website, defining structure,
        content, and presentation.
      </p>
      <div class="flex items-center gap-3">
        <img
          src="./assets/images/image-avatar.webp"
          alt="Profile image of Greg Hooper"
          class="w-8"
        />
        <span class="font-extrabold">Greg Hooper</span>
      </div>
    </main>
    <!-- <footer class="attribution fixed bottom-0 w-full mb-3">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">CJ Kim</a>.
    </footer> -->
  </body>
</html>
